openapi: 3.1.0

info:
  title: Sprout API
  version: 1.0.0

paths:
  /api/plants:
    get:
      summary: Returns the user's plants
      responses:
        "200":
          description: A JSON array of plants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plant"
    post:
      summary: Add a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantInput"
      responses:
        "201":
          description: Plant added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"

  /api/plants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a plant
      responses:
        "200":
          description: The fetched plant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"

    put:
      summary: Update a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlantInput"
      responses:
        "200":
          description: Plant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"

    delete:
      summary: Delete a plant
      responses:
        "204":
          description: Plant deleted

  /api/plants/{id}/archive:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Archive a plant
      responses:
        "200":
          description: Plant archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"

  /api/plant-types:
    get:
      summary: Get all plant types
      responses:
        "200":
          description: A list of unique plant type names
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlantType"

  /api/plant-types/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a plant type
      responses:
        "200":
          description: The fetched plant type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantType"

  /api/plant-types/{id}/catalogue:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get catalogue entries for a plant type
      responses:
        "200":
          description: Catalogue entries for this plant type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CataloguePlant"

  /api/catalogue:
    get:
      summary: Get all catalogue plants (flat list)
      responses:
        "200":
          description: All catalogue entries with resolved plant names
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CataloguePlant"

  /auth/google:
    get:
      summary: Redirect to Google OAuth
      responses:
        "302":
          description: Redirects to Google login

  /auth/google/callback:
    get:
      summary: Google OAuth callback
      responses:
        "302":
          description: Redirects to frontend with JWT token

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BasePlant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        variety:
          type: string
        description:
          type: string
        position:
          type: string
        hardiness:
          type: string
        spacing:
          type: string
        seed_to_harvest:
          type: string
        sowing_to_transplant:
          type: string
        harvest:
          type: string
        sowing_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"
        harvest_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"
        transplant_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"
      required:
        - id
        - name

    Plant:
      allOf:
        - $ref: "#/components/schemas/BasePlant"
        - type: object
          properties:
            plant_type_id:
              type: string
              format: uuid
            catalogue_id:
              type: string
              format: uuid
            custom_variety:
              type: string
            suitability:
              type: array
              items:
                type: string
                enum:
                  - multisow
                  - interplant
                  - follow-on
            sow_dates:
              type: array
              items:
                type: string
                format: date
            transplant_dates:
              type: array
              items:
                type: string
                format: date
            icon:
              type: string
            notes:
              type: string

    PlantType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category_id:
          type: integer
        icon:
          type: string
      required:
        - id
        - name

    CataloguePlant:
      allOf:
        - $ref: "#/components/schemas/BasePlant"
        - type: object
          properties:
            plant_type_id:
              type: string
              format: uuid
            suitability:
              type: array
              items:
                type: string
                enum:
                  - multisow
                  - interplant
                  - follow-on
            source:
              type: string

    PlantInput:
      type: object
      required:
        - plant_type_id
      properties:
        plant_type_id:
          type: string
          format: uuid
        catalogue_id:
          type: string
          format: uuid
        custom_variety:
          type: string
        sow_dates:
          type: array
          items:
            type: string
            format: date
        transplant_dates:
          type: array
          items:
            type: string
            format: date
        notes:
          type: string
        overrides:
          $ref: "#/components/schemas/PlantOverrides"

    PlantOverrides:
      type: object
      description: Optional overrides for catalogue fields (e.g. from a seed packet)
      properties:
        description:
          type: string
        position:
          type: string
        hardiness:
          type: string
        spacing:
          type: string
        seed_to_harvest:
          type: string
        sowing_to_transplant:
          type: string
        harvest:
          type: string
        suitability:
          type: array
          items:
            type: string
            enum:
              - multisow
              - interplant
              - follow-on
        sowing_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"
        harvest_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"
        transplant_windows:
          type: array
          items:
            $ref: "#/components/schemas/Window"

    Window:
      type: object
      properties:
        start:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: Start of window as MM-DD (e.g. "01-15")
        end:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: End of window as MM-DD (e.g. "03-31")
        label:
          type: string
          description: Optional label for this window (e.g. "salad leaves")
      required:
        - start
        - end
