openapi: 3.1.0

info:
  title: Sprout API
  version: 1.0.0

paths:
  /api/plants:
    get:
      summary: Returns the user's plants
      responses:
        '200':
          description: A JSON array of plants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plant'
    post:
      summary: Add a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantInput'
      responses:
        '201':
          description: Plant added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

  /api/plants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a plant
      responses:
        '200':
          description: The fetched plant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

    put:
      summary: Update a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantInput'
      responses:
        '200':
          description: Plant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

    delete:
      summary: Delete a plant
      responses:
        '204':
          description: Plant deleted

  /api/catalogue:
    get:
      summary: Get all catalogue plants
      responses:
        '200':
          description: A list of all available plants in the catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CataloguePlant'

  /api/catalogue/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a catalogue plant
      responses:
        '200':
          description: The fetched catalogue plant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CataloguePlant'

  /auth/google:
    get:
      summary: Redirect to Google OAuth
      responses:
        '302':
          description: Redirects to Google login

  /auth/google/callback:
    get:
      summary: Google OAuth callback
      responses:
        '302':
          description: Redirects to frontend with JWT token

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BasePlant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        variety:
          type: string
        description:
          type: string
        position:
          type: string
        hardiness:
          type: string
        spacing:
          type: string
        seed_to_harvest:
          type: string
        sowing_to_transplant:
          type: string
        harvest:
          type: string
        sowing_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        harvest_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        transplant_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
      required:
        - id
        - name

    Plant:
      allOf:
        - $ref: '#/components/schemas/BasePlant'
        - type: object
          properties:
            catalogue_id:
              type: string
              format: uuid
            sow_dates:
              type: array
              items:
                type: string
                format: date
            transplant_dates:
              type: array
              items:
                type: string
                format: date
            notes:
              type: string

    CataloguePlant:
      allOf:
        - $ref: '#/components/schemas/BasePlant'
        - type: object
          properties:
            category_id:
              type: integer
            source:
              type: string

    PlantInput:
      type: object
      properties:
        catalogue_id:
          type: string
          format: uuid
        name_override:
          type: string
        variety:
          type: string
        sow_dates:
          type: array
          items:
            type: string
            format: date
        transplant_dates:
          type: array
          items:
            type: string
            format: date
        notes:
          type: string
        overrides:
          $ref: '#/components/schemas/PlantOverrides'

    PlantOverrides:
      type: object
      description: Optional overrides for catalogue fields (e.g. from a seed packet)
      properties:
        description:
          type: string
        position:
          type: string
        hardiness:
          type: string
        spacing:
          type: string
        seed_to_harvest:
          type: string
        sowing_to_transplant:
          type: string
        harvest:
          type: string
        sowing_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        harvest_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        transplant_windows:
          type: array
          items:
            $ref: '#/components/schemas/Window'

    Window:
      type: object
      properties:
        start:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: Start of window as MM-DD (e.g. "01-15")
        end:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: End of window as MM-DD (e.g. "03-31")
        label:
          type: string
          description: Optional label for this window (e.g. "salad leaves")
      required:
        - start
        - end
