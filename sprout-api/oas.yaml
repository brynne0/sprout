openapi: 3.1.0

info:
  title: Sprout API
  version: 1.0.0

paths:
  /api/plants:
    get:
      summary: Returns the user's plants
      responses:
        '200':
          description: A JSON array of plants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plant'
    post:
      summary: Add a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantInput'
      responses:
        '201':
          description: Plant added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

  /api/plants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a plant
      responses:
        '200':
          description: The fetched plant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

    put:
      summary: Update a plant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantInput'
      responses:
        '200':
          description: Plant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'

    delete:
      summary: Delete a plant
      responses:
        '204':
          description: Plant deleted

  /api/catalog:
    get:
      summary: Get all catalog plants
      responses:
        '200':
          description: A list of all available plants in the catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogPlant'

  /api/catalog/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a catalog plant
      responses:
        '200':
          description: The fetched catalog plant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogPlant'

  /auth/google:
    get:
      summary: Redirect to Google OAuth
      responses:
        '302':
          description: Redirects to Google login

  /auth/google/callback:
    get:
      summary: Google OAuth callback
      responses:
        '302':
          description: Redirects to frontend with JWT token

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Plant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        catalogId:
          type: string
          format: uuid
        name:
          type: string
        variety:
          type: string
        sowDate:
          type: string
          format: date
        sowingWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        harvestWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        transplantWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        notes:
          type: string
      required:
        - id
        - name
        - sowDate

    PlantInput:
      type: object
      properties:
        catalogId:
          type: string
          format: uuid
        nameOverride:
          type: string
        variety:
          type: string
        sowDate:
          type: string
          format: date
        sowingWindowsOverride:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        harvestWindowsOverride:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        transplantWindowsOverride:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        notes:
          type: string
      required:
        - sowDate

    CatalogPlant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        position:
          type: string
        hardiness:
          type: string
        spacing:
          type: string
        seedToHarvest:
          type: string
        sowingToTransplant:
          type: string
        harvest:
          type: string
        sowingWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        harvestWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        transplantWindows:
          type: array
          items:
            $ref: '#/components/schemas/Window'
        source:
          type: string
      required:
        - id
        - name

    Window:
      type: object
      properties:
        start:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: Start of window as MM-DD (e.g. "01-15")
        end:
          type: string
          pattern: '^\d{2}-\d{2}$'
          description: End of window as MM-DD (e.g. "03-31")
      required:
        - start
        - end
