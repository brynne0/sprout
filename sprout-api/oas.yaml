openapi: 3.2.0

info:
  title: Sprout API
  version: 1.0.0

paths:
  /api/plants:
    get:
      summary: Returns the user's plants
      responses:
        '200':
          description: A JSON array of plants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plant'

components:
  schemas:
    Plant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        variety:
          type: string
      required:
        - id
        - name
