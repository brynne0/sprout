services:
  postgres:
    image: postgres:16
    container_name: sprout-db
    environment:
      POSTGRES_DB: sprout
      POSTGRES_USER: sprout
      POSTGRES_PASSWORD: sprout
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - '8080:8080'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sprout
      DB_USER: sprout
      DB_PASSWORD: sprout
    depends_on:
      - postgres

volumes:
  postgres_data:
